name: Deploy Node.js Backend to Namecheap

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'uploads/**'
      - 'database/**'
      - 'migrations/**'
      - 'scripts/**'
      - 'node_modules/**'
      - 'logs/**'
      - 'tmp/**'
      - '.env'
      - '.env.*'
      - '.htaccess'
      - '.gitignore'
      - 'env.example'
      - 'db.sql'
      - 'dbsql'
      - 'dbSchema.sql'
      - 'dbschem.sql'
      - 'API_QUICK_REFERENCE.md'
      - 'IMAGE_STORAGE_GUIDE.md'
      - 'PAYMENT_FLOW_IMPROVEMENTS.md'
      - 'PAYMENT_FRAUD_PREVENTION_ANALYSIS.md'
      - 'README.md'
      - '**/*.sql'
      - '**/*.md'
      - '.DS_Store'
      - '**/.DS_Store'
      - '__MACOSX/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.NAMECHEAP_SSH_HOST }}
      SSH_PORT: ${{ secrets.NAMECHEAP_SSH_PORT }}
      SSH_USER: ${{ secrets.NAMECHEAP_SSH_USER }}
      SSH_KEY: ${{ secrets.NAMECHEAP_SSH_KEY }}
      APP_PATH: ${{ secrets.NAMECHEAP_APP_PATH }}

    steps:
      # ================= CHECKOUT CODE =================
      - name: Checkout Code
        uses: actions/checkout@v4

      # ================= SETUP NODE =================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ================= VALIDATE SECRETS =================
      - name: Validate Deploy Secrets
        run: |
          echo "Validating deployment configuration..."

          if [ -z "$SSH_HOST" ]; then
            echo "ERROR: NAMECHEAP_SSH_HOST secret is missing."
            exit 1
          fi

          if [ -z "$SSH_PORT" ]; then
            echo "ERROR: NAMECHEAP_SSH_PORT secret is missing."
            exit 1
          fi

          if [ -z "$SSH_USER" ]; then
            echo "ERROR: NAMECHEAP_SSH_USER secret is missing."
            exit 1
          fi

          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: NAMECHEAP_SSH_KEY secret is missing."
            exit 1
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: NAMECHEAP_APP_PATH secret is missing."
            exit 1
          fi

          if [ "$SSH_PORT" = "2083" ]; then
            echo "ERROR: Port 2083 is cPanel HTTPS port, not SSH."
            echo "Use Namecheap SSH port, usually 21098 or 22."
            exit 1
          fi

          if [ "$SSH_PORT" = "2082" ]; then
            echo "ERROR: Port 2082 is cPanel HTTP port, not SSH."
            echo "Use Namecheap SSH port, usually 21098 or 22."
            exit 1
          fi

          echo "Deployment configuration looks okay."
          echo "App path: $APP_PATH"

      # ================= SETUP SSH KEY =================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh

          printf "%s\n" "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Checking private key format..."
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub

          echo "Private key is valid."
          echo "Public key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key.pub

      # ================= TEST SSH CONNECTION =================
      - name: Test SSH Connection
        run: |
          echo "Testing SSH port..."
          nc -vz "$SSH_HOST" "$SSH_PORT"

          echo "Testing SSH login..."
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAuthentication=yes \
            -o PreferredAuthentications=publickey \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            -o HostkeyAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$APP_PATH' && cd '$APP_PATH' && pwd && echo 'SSH CONNECTION SUCCESS'"

      # ================= CREATE DEPLOY VERSION FILE =================
      - name: Create Deploy Version File
        run: |
          echo "Deploy commit: $GITHUB_SHA" > DEPLOY_VERSION.txt
          echo "Deploy time UTC: $(date -u)" >> DEPLOY_VERSION.txt
          echo "GitHub run id: $GITHUB_RUN_ID" >> DEPLOY_VERSION.txt
          echo "GitHub run attempt: $GITHUB_RUN_ATTEMPT" >> DEPLOY_VERSION.txt

      # ================= CLEAN REMOTE BUT KEEP PROTECTED FILES =================
      - name: Clean Remote Folder Safely
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAuthentication=yes \
            -o PreferredAuthentications=publickey \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            -o HostkeyAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            "$SSH_USER@$SSH_HOST" << EOF
              set -e

              mkdir -p "$APP_PATH"
              cd "$APP_PATH"

              echo "Remote app path:"
              pwd

              echo "Creating protected folders if missing..."
              mkdir -p uploads
              mkdir -p logs
              mkdir -p tmp

              echo "Cleaning remote app folder..."
              echo "These protected items will NOT be touched:"
              echo "- uploads"
              echo "- database"
              echo "- migrations"
              echo "- scripts"
              echo "- logs"
              echo "- tmp"
              echo "- node_modules"
              echo "- .env"
              echo "- .htaccess"
              echo "- .gitignore"
              echo "- env.example"
              echo "- db.sql"
              echo "- dbSchema.sql"
              echo "- API_QUICK_REFERENCE.md"
              echo "- IMAGE_STORAGE_GUIDE.md"
              echo "- PAYMENT_FLOW_IMPROVEMENTS.md"
              echo "- PAYMENT_FRAUD_PREVENTION_ANALYSIS.md"
              echo "- README.md"

              find . -mindepth 1 -maxdepth 1 \
                ! -name 'uploads' \
                ! -name 'database' \
                ! -name 'migrations' \
                ! -name 'scripts' \
                ! -name 'logs' \
                ! -name 'tmp' \
                ! -name 'node_modules' \
                ! -name '.env' \
                ! -name '.htaccess' \
                ! -name '.gitignore' \
                ! -name 'env.example' \
                ! -name 'db.sql' \
                ! -name 'dbsql' \
                ! -name 'dbSchema.sql' \
                ! -name 'dbschem.sql' \
                ! -name 'API_QUICK_REFERENCE.md' \
                ! -name 'IMAGE_STORAGE_GUIDE.md' \
                ! -name 'PAYMENT_FLOW_IMPROVEMENTS.md' \
                ! -name 'PAYMENT_FRAUD_PREVENTION_ANALYSIS.md' \
                ! -name 'README.md' \
                -exec rm -rf {} +

              echo "Remote folder cleaned safely."
          EOF

      # ================= DEPLOY CODE VIA SCP =================
      - name: Deploy Code via SCP
        run: |
          echo "Deploying normal code files/folders only..."

          for item in * .[^.]*; do
            if [ ! -e "$item" ]; then
              continue
            fi

            case "$item" in
              .|..)
                echo "Skipping: $item"
                ;;

              .git|.github|node_modules|uploads|database|migrations|scripts|logs|tmp|.cursor|__MACOSX)
                echo "Skipping protected/excluded folder: $item"
                ;;

              .env|.env.*|.htaccess|.gitignore|env.example|.DS_Store)
                echo "Skipping protected/excluded file: $item"
                ;;

              db.sql|dbsql|dbSchema.sql|dbschem.sql)
                echo "Skipping protected database file: $item"
                ;;

              API_QUICK_REFERENCE.md|IMAGE_STORAGE_GUIDE.md|PAYMENT_FLOW_IMPROVEMENTS.md|PAYMENT_FRAUD_PREVENTION_ANALYSIS.md|README.md)
                echo "Skipping protected documentation file: $item"
                ;;

              *.sql|*.md)
                echo "Skipping SQL/Markdown file: $item"
                ;;

              *)
                echo "Uploading item: $item"

                scp -r \
                  -P "$SSH_PORT" \
                  -i ~/.ssh/deploy_key \
                  -o BatchMode=yes \
                  -o IdentitiesOnly=yes \
                  -o StrictHostKeyChecking=no \
                  -o UserKnownHostsFile=/dev/null \
                  -o PubkeyAuthentication=yes \
                  -o PreferredAuthentications=publickey \
                  -o PubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
                  -o HostkeyAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
                  "$item" \
                  "$SSH_USER@$SSH_HOST:$APP_PATH/"
                ;;
            esac
          done

      # ================= VERIFY DEPLOY =================
      - name: Verify Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAuthentication=yes \
            -o PreferredAuthentications=publickey \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            -o HostkeyAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            "$SSH_USER@$SSH_HOST" << EOF
              set -e

              cd "$APP_PATH"

              echo "Remote files after deploy:"
              ls -la

              echo "Checking protected files/folders:"
              test -d uploads && echo "uploads folder exists"
              test -d logs && echo "logs folder exists"
              test -d tmp && echo "tmp folder exists"
              test -d node_modules && echo "node_modules exists"

              if [ -d database ]; then echo "database folder exists and was protected"; fi
              if [ -d migrations ]; then echo "migrations folder exists and was protected"; fi
              if [ -d scripts ]; then echo "scripts folder exists and was protected"; fi

              if [ -f .htaccess ]; then echo ".htaccess exists and was protected"; fi
              if [ -f .env ]; then echo ".env exists and was protected"; fi
              if [ -f .gitignore ]; then echo ".gitignore exists and was protected"; fi
              if [ -f env.example ]; then echo "env.example exists and was protected"; fi
              if [ -f db.sql ]; then echo "db.sql exists and was protected"; fi
              if [ -f dbSchema.sql ]; then echo "dbSchema.sql exists and was protected"; fi
              if [ -f API_QUICK_REFERENCE.md ]; then echo "API_QUICK_REFERENCE.md exists and was protected"; fi
              if [ -f IMAGE_STORAGE_GUIDE.md ]; then echo "IMAGE_STORAGE_GUIDE.md exists and was protected"; fi
              if [ -f PAYMENT_FLOW_IMPROVEMENTS.md ]; then echo "PAYMENT_FLOW_IMPROVEMENTS.md exists and was protected"; fi
              if [ -f PAYMENT_FRAUD_PREVENTION_ANALYSIS.md ]; then echo "PAYMENT_FRAUD_PREVENTION_ANALYSIS.md exists and was protected"; fi
              if [ -f README.md ]; then echo "README.md exists and was protected"; fi

              echo "Checking deployment version:"
              if [ ! -f DEPLOY_VERSION.txt ]; then
                echo "ERROR: DEPLOY_VERSION.txt not found. Deploy failed."
                exit 1
              fi

              cat DEPLOY_VERSION.txt

              echo "Verification completed."
          EOF

      # ================= INSTALL DEPENDENCIES AND RESTART =================
      - name: Install Dependencies and Restart Node.js App
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PubkeyAuthentication=yes \
            -o PreferredAuthentications=publickey \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            -o HostkeyAlgorithms=+ssh-rsa,rsa-sha2-256,rsa-sha2-512 \
            "$SSH_USER@$SSH_HOST" << EOF
              set -e

              cd "$APP_PATH"

              echo "Current directory:"
              pwd

              echo "Installing production dependencies..."

              APP_NAME=\$(basename "$APP_PATH")
              NPM_PATH=\$(find ~/nodevenv -path "*/\$APP_NAME/*/bin/npm" | head -n 1)

              if [ -n "\$NPM_PATH" ]; then
                echo "Found App NPM at: \$NPM_PATH"
                "\$NPM_PATH" install --omit=dev
              else
                echo "Warning: Specific NPM not found. Trying cloudlinux-selector..."

                cloudlinux-selector run --json --interpreter nodejs --user "$SSH_USER" --app-root "$APP_PATH" --command "npm install --omit=dev" || \
                selectorctl --run --user "$SSH_USER" --app-root "$APP_PATH" --command "npm install --omit=dev" || \
                npm install --omit=dev
              fi

              echo "Triggering app restart..."
              mkdir -p tmp
              touch tmp/restart.txt

              cloudlinux-selector restart --json --interpreter nodejs --user "$SSH_USER" --app-root "$APP_PATH" || \
              selectorctl --restart --user "$SSH_USER" --app-root "$APP_PATH" || \
              {
                echo "ERROR: Could not restart Node.js app automatically."
                echo "If Namecheap says shell access is disabled, restart manually from cPanel."
                exit 1
              }

              echo "Backend deployment completed."
          EOF

      # ================= DONE =================
      - name: Deployment Complete
        run: echo "Node.js backend deployment completed successfully"
